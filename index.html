<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Louvor IMESC</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
text-align:center;
padding:20px;
}

.container{
width:95%;
max-width:1000px;
margin:auto;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin:15px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#1f3c88;
color:white;
cursor:pointer;
margin-top:5px;
}

button:hover{
opacity:0.9;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:95%;
max-width:700px;
max-height:80vh;
overflow:auto;
}

.close{
float:right;
cursor:pointer;
color:red;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border-bottom:1px solid #ddd;
padding:8px;
font-size:14px;
}

th{
background:#eee;
}

input{
width:100%;
padding:6px;
margin:3px 0;
}

.links img{
width:22px;
}

</style>
</head>

<body>

<header>
<h1>Escala Louvor IMESC</h1>
</header>

<div class="container">

<div class="card">
<strong>15/03/2026</strong><br>
Líder: Lincoln<br>
Vocal: Monique, Manu Ceia<br>
Bateria: Nana<br>
<button onclick="openModal('15-03-2026')">Ver Repertório</button>
</div>

<div class="card">
<strong>22/03/2026</strong><br>
Líder: Jakson<br>
Vocal: Fabi, Mônica<br>
Bateria: Isaque<br>
<button onclick="openModal('22-03-2026')">Ver Repertório</button>
</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">X</span>

<h3>Repertório</h3>

<button onclick="mostrarFormulario()">➕ Adicionar Música</button>

<button onclick="compartilharWhatsapp()">📲 Compartilhar</button>

<div id="formMusica" style="display:none">

<input id="musicaNome" placeholder="Música">

<input id="musicaArtista" placeholder="Artista">

<input id="musicaTom" placeholder="Tom">

<input id="musicaYoutube" placeholder="Link Youtube">

<input id="musicaSpotify" placeholder="Link Spotify">

<input id="musicaCifra" placeholder="Link Cifra">

<button onclick="adicionarMusica()">Salvar Música</button>

</div>

<div id="conteudoRepertorio"></div>

</div>
</div>

<script>

let repertorios = JSON.parse(localStorage.getItem("repertorios")) || {};

let repertorioAtual = null;

function salvar(){

localStorage.setItem("repertorios",JSON.stringify(repertorios));

}

function openModal(data){

repertorioAtual=data;

const modal=document.getElementById("modal");

modal.style.display="flex";

renderTabela();

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

function mostrarFormulario(){

const form=document.getElementById("formMusica");

form.style.display=form.style.display=="none"?"block":"none";

}

function adicionarMusica(){

const musica=document.getElementById("musicaNome").value;

const artista=document.getElementById("musicaArtista").value;

const tom=document.getElementById("musicaTom").value;

const youtube=document.getElementById("musicaYoutube").value;

const spotify=document.getElementById("musicaSpotify").value;

const cifra=document.getElementById("musicaCifra").value;

const nova={musica,artista,tom,youtube,spotify,cifra};

if(!repertorios[repertorioAtual]){

repertorios[repertorioAtual]=[];

}

repertorios[repertorioAtual].push(nova);

salvar();

renderTabela();

}

function removerMusica(index){

repertorios[repertorioAtual].splice(index,1);

salvar();

renderTabela();

}

function editarMusica(index){

const m=repertorios[repertorioAtual][index];

document.getElementById("musicaNome").value=m.musica;

document.getElementById("musicaArtista").value=m.artista;

document.getElementById("musicaTom").value=m.tom;

document.getElementById("musicaYoutube").value=m.youtube;

document.getElementById("musicaSpotify").value=m.spotify;

document.getElementById("musicaCifra").value=m.cifra;

removerMusica(index);

mostrarFormulario();

}

function renderTabela(){

const conteudo=document.getElementById("conteudoRepertorio");

if(!repertorios[repertorioAtual] || repertorios[repertorioAtual].length==0){

conteudo.innerHTML="<p><strong>AGUARDANDO MINISTRO DIVULGAR</strong></p>";

return;

}

let html="<table>";

html+="<tr><th>#</th><th>Música</th><th>Artista</th><th>Tom</th><th>Links</th><th>Ações</th></tr>";

repertorios[repertorioAtual].forEach((m,i)=>{

html+=`

<tr draggable="true"

ondragstart="drag(event,${i})"

ondrop="drop(event,${i})"

ondragover="allowDrop(event)">

<td>${i+1}</td>

<td>${m.musica}</td>

<td>${m.artista}</td>

<td>${m.tom}</td>

<td class="links">

<a href="${m.youtube}" target="_blank">▶</a>

<a href="${m.spotify}" target="_blank">🎧</a>

<a href="${m.cifra}" target="_blank">🎼</a>

</td>

<td>

<button onclick="editarMusica(${i})">✏</button>

<button onclick="removerMusica(${i})">🗑</button>

</td>

</tr>

`;

});

html+="</table>";

conteudo.innerHTML=html;

}

let dragIndex;

function allowDrop(ev){

ev.preventDefault();

}

function drag(ev,index){

dragIndex=index;

}

function drop(ev,index){

ev.preventDefault();

const item=repertorios[repertorioAtual][dragIndex];

repertorios[repertorioAtual].splice(dragIndex,1);

repertorios[repertorioAtual].splice(index,0,item);

salvar();

renderTabela();

}

function compartilharWhatsapp(){

let texto="🎶 Repertório do Culto\n\n";

if(!repertorios[repertorioAtual]) return;

repertorios[repertorioAtual].forEach((m,i)=>{

texto+=`${i+1}. ${m.musica} - ${m.artista} (Tom ${m.tom})\n`;

});

const url="https://wa.me/?text="+encodeURIComponent(texto);

window.open(url,"_blank");

}

</script>

</body>
</html>
